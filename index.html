<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORDER SIMULATOR: AI Core OCR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="main.js" defer></script>
</head>
<body>

<div class="dashboard-wrapper">
    <header class="header">
        <h1>ORDER SIMULATOR <span>AI Core OCR Prototype</span></h1>
    </header>

    <div class="grid-container">
        <div class="panel input-panel">
            <h2 class="panel-title">1. GOT画面 撮影・読込</h2>
            <p class="panel-desc">カメラで「4週間一覧表」等の画面を撮影してください。</p>
            
            <div class="camera-container">
                <video id="cameraVideo" autoplay playsinline muted></video>
                <canvas id="captureCanvas" style="display:none;"></canvas>
                
                <div id="ocrStatus" class="ocr-status" style="display:none;">
                    <div class="spinner"></div>
                    <span id="ocrStatusText">AIが文字を解析中...</span>
                </div>
            </div>

            <div class="camera-controls">
                <button id="btn-start-camera" class="btn-secondary">📷 カメラ起動</button>
                <button id="btn-snap" class="btn-capture" disabled>📸 撮影して読み取る</button>
            </div>

            <textarea id="gotDataInput" style="display:none;" placeholder="ここにOCRの読み取り結果が入ります。修正可能です。"></textarea>
            
            <h2 class="panel-title" style="margin-top: 24px;">2. 複合変動要因（AI予測用）</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>対象日</label>
                    <input type="date" id="targetDate">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>本日最高気温 (℃)</label>
                    <input type="number" id="todayTemp" value="28">
                </div>
                <div class="form-group">
                    <label>昨日最高気温 (℃)</label>
                    <input type="number" id="yesterdayTemp" value="22">
                </div>
            </div>

            <button id="btn-analyze" class="btn-primary" disabled>⚡ AI 解析 ＆ 発注数算出</button>
        </div>

        <div class="panel result-panel">
            <h2 class="panel-title">AI 思考プロセス可視化</h2>
            
            <div class="summary-cards">
                <div class="card">
                    <span>基本予測需要</span>
                    <strong id="dispBase">--</strong>
                </div>
                <div class="card">
                    <span>AI 変動スコア</span>
                    <strong id="dispScore" style="color: #10b981;">--</strong>
                </div>
                <div class="card highlight">
                    <span>AI 最終発注提案</span>
                    <strong id="dispFinalOrder">-- <small>個</small></strong>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="aiChart"></canvas>
            </div>

            <div id="aiCommentary" class="ai-commentary">
                ここにAIの分析コメント（なぜこの数値を提案したか）が表示されます。
            </div>
        </div>
    </div>
</div>

</body>
</html>
