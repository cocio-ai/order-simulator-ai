<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F4F5F7">
    <title>ORDER SIMULATOR: AI Core (Speed Entry)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js" defer></script>
</head>
<body>

<div class="app-wrapper">
    <header class="header">
        <h1>ORDER SIMULATOR <span>AI Core Speed Entry</span></h1>
        <div class="date-weather-info">
            <input type="date" id="targetDate" class="stealth-input">
            <span class="weather-box">今日: <input type="number" id="todayTemp" value="28" class="temp-input">℃</span>
            <span class="weather-box">昨日: <input type="number" id="yesterdayTemp" value="22" class="temp-input">℃</span>
        </div>
    </header>

    <div class="grid-container">
        <div class="panel input-panel">
            <div class="category-select-box">
                <select id="categoryName">
                    <option value="" disabled selected>分類を選択してください</option>
                    <option value="おにぎり">おにぎり</option>
                    <option value="こだわりおにぎり">こだわりおにぎり</option>
                    <option value="弁当">弁当（常温）</option>
                    <option value="チルド弁当">チルド弁当</option>
                    <option value="寿司">寿司</option>
                    <option value="サンドイッチ">サンドイッチ</option>
                    <option value="ロール">ロール</option>
                    <option value="スパゲティパスタ">スパゲティパスタ</option>
                    <option value="グラタンドリア">グラタンドリア</option>
                    <option value="調理麺">調理麺（冷たい麺）</option>
                    <option value="カップ麺">カップ麺</option>
                    <option value="惣菜">惣菜</option>
                    <option value="カップデリ">カップデリ</option>
                    <option value="サラダ">サラダ</option>
                </select>
            </div>

            <div class="input-fields-container">
                <div class="input-row active" data-field="avgSales">
                    <label>平均販売数 (週平均)</label>
                    <div class="value-display" id="val-avgSales"></div>
                </div>
                <div class="input-row" data-field="currentStock">
                    <label>現在庫 (発注時)</label>
                    <div class="value-display" id="val-currentStock"></div>
                </div>
                <div class="flex-row">
                    <div class="input-row half" data-field="maxSales">
                        <label>最高販売</label>
                        <div class="value-display" id="val-maxSales"></div>
                    </div>
                    <div class="input-row half" data-field="minSales">
                        <label>最小販売</label>
                        <div class="value-display" id="val-minSales"></div>
                    </div>
                </div>
                <div class="flex-row">
                    <div class="input-row half danger" data-field="avgWaste">
                        <label>平均廃棄数</label>
                        <div class="value-display" id="val-avgWaste"></div>
                    </div>
                    <div class="input-row half warning" data-field="avgShortageRate">
                        <label>欠品率 (%)</label>
                        <div class="value-display" id="val-avgShortageRate"></div>
                    </div>
                </div>
            </div>

            <div class="custom-keypad">
                <button class="key-btn num" data-num="7">7</button>
                <button class="key-btn num" data-num="8">8</button>
                <button class="key-btn num" data-num="9">9</button>
                <button class="key-btn num" data-num="4">4</button>
                <button class="key-btn num" data-num="5">5</button>
                <button class="key-btn num" data-num="6">6</button>
                <button class="key-btn num" data-num="1">1</button>
                <button class="key-btn num" data-num="2">2</button>
                <button class="key-btn num" data-num="3">3</button>
                <button class="key-btn clear" id="btn-clear">C</button>
                <button class="key-btn num" data-num="0">0</button>
                <button class="key-btn next" id="btn-next">次へ ❯</button>
            </div>
            
            <button id="btn-analyze" class="btn-primary" disabled>⚡ AI 解析実行</button>
        </div>

        <div class="panel result-panel">
            <div class="result-header">
                <strong id="resCategory">未算出</strong>
            </div>

            <div class="summary-cards">
                <div class="card">
                    <span>基本需要</span>
                    <strong id="dispBase">--</strong>
                </div>
                <div class="card">
                    <span>AI 変動スコア</span>
                    <strong id="dispScore" style="color: var(--seven-green);">--</strong>
                </div>
                <div class="card highlight">
                    <span>最終 提案発注数</span>
                    <strong id="dispFinalOrder">-- <small>個</small></strong>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="aiChart"></canvas>
            </div>

            <div id="aiCommentary" class="ai-commentary">
                ここにAIの分析コメント（なぜこの数値を提案したか）が表示されます。
            </div>
        </div>
    </div>
</div>

</body>
</html>
