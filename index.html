<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORDER SIMULATOR: AI Core</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js" defer></script>
</head>
<body>

<div class="dashboard-wrapper">
    <header class="header">
        <h1>ORDER SIMULATOR <span>AI Core Prototype</span></h1>
    </header>

    <div class="grid-container">
        <div class="panel input-panel">
            <h2 class="panel-title">1. GOTデータ 一括パース(読込)</h2>
            <p class="panel-desc">ストアパソコンのテキストをそのまま貼り付けてください。</p>
            <textarea id="gotDataInput" placeholder="【貼り付け例】
分類: 調理麺
平均販売数: 24
現在庫: 5
平均廃棄数: 2"></textarea>
            
            <h2 class="panel-title" style="margin-top: 24px;">2. 複合変動要因（AI予測用）</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>対象日 (給料日・休日前判定)</label>
                    <input type="date" id="targetDate">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>本日の最高気温 (℃)</label>
                    <input type="number" id="todayTemp" value="28">
                </div>
                <div class="form-group">
                    <label>昨日の最高気温 (℃) ※寒暖差検知</label>
                    <input type="number" id="yesterdayTemp" value="22">
                </div>
            </div>

            <button id="btn-analyze" class="btn-primary">⚡ AI 解析 ＆ 発注数算出</button>
        </div>

        <div class="panel result-panel">
            <h2 class="panel-title">AI 思考プロセス可視化</h2>
            
            <div class="summary-cards">
                <div class="card">
                    <span>基本予測需要</span>
                    <strong id="dispBase">--</strong>
                </div>
                <div class="card">
                    <span>AI 変動スコア</span>
                    <strong id="dispScore" style="color: #10b981;">--</strong>
                </div>
                <div class="card highlight">
                    <span>AI 最終発注提案</span>
                    <strong id="dispFinalOrder">-- <small>個</small></strong>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="aiChart"></canvas>
            </div>

            <div id="aiCommentary" class="ai-commentary">
                ここにAIの分析コメント（なぜこの数値を提案したか）が表示されます。
            </div>
        </div>
    </div>
</div>

</body>
</html>
